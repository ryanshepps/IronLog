services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ironlog
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ironlog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:5000"
    environment:
      DATABASE_URL: postgresql://ironlog:${DB_PASSWORD}@db:5432/ironlog
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: "5000"
      EXPO_PUBLIC_DOMAIN: ironlog.lastingsoftware.ca
      ALLOWED_ORIGINS: https://ironlog.lastingsoftware.ca

volumes:
  pgdata:
